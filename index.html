<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />

  <!-- TODO 1: Adicione a meta tag de viewport para tornar a página responsiva -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Lista de Tarefas</title>
  <!-- TODO 2: Vincule o arquivo CSS externo localizado em assets/css/style.css -->
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

  <!-- ===== CABEÇALHO ===== -->
  <header>
    <h1>📝 Minhas Tarefas</h1>
    <p>Gerencie suas atividades do dia</p>
  </header>

  <!-- ===== CONTEÚDO PRINCIPAL ===== -->
  <main>

    <!-- Formulário para adicionar tarefas -->
    <section id="formulario">

      <!-- TODO 3: Crie um campo de texto (input type="text") com:
           - id="inputTarefa"
           - placeholder="Digite uma nova tarefa..."
      -->
      <input type="text" id="inputTarefa" placeholder="Digite uma nova tarefa">

      <!-- TODO 4: Crie um botão com:
           - id="btnAdicionar"
           - Texto: "Adicionar"
           - Evento onclick que chame a função adicionarTarefa()
      -->
      <button id="btnAdicionar" onclick="adicionarTarefa()">Adicionar</button>

    </section>

    <!-- Contador de tarefas -->
    <section id="info">
      <span id="contadorTexto">Nenhuma tarefa adicionada.</span>
    </section>

    <!-- Lista de tarefas -->
    <section id="listaTarefas">

      <!-- TODO 5: Crie uma lista não-ordenada com id="lista" -->
      <ul id="lista"></ul>

    </section>

  </main>

  <!-- ===== RODAPÉ ===== -->
  <footer>
    <p>Aula 02 - Revisão HTML, CSS e JavaScript</p>
  </footer>

  <!-- TODO 6: Vincule o arquivo JavaScript localizado em assets/js/script.js -->


  <script src="assets/js/script.js"></script>
</body>

</html>
